x-airflow-common-env: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}

    # Base de datos externa
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}

    # Celery
    AIRFLOW__CELERY__BROKER_URL: >-
      amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672/${RABBITMQ_DEFAULT_VHOST}
    AIRFLOW__CELERY__RESULT_BACKEND: >-
      db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    AIRFLOW__CELERY__TASK_ACKS_LATE: "true"

    # API / UI
    AIRFLOW__API__SECRET_KEY: ${API_SERVER_SECRET_KEY}
    AIRFLOW__API__WORKERS: "1"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW__API__ENABLE_EXPERIMENTAL_API: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${API_SERVER_SECRET_KEY}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__WEBSERVER__RBAC: "true"

    # Logging
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__LOGGING__LOG_LEVEL: INFO

x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE_NAME}
  restart: unless-stopped
  env_file:
    - ../.env
  environment:
    <<: *airflow-common-env

  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
  networks:
    - airflow_net

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - airflow_net

  airflow-init:
    <<: *airflow-common
    profiles:
      - init
    command: >
      bash -c "echo 'Esperando a que PostgreSQL externo este disponible...' &&
      until airflow db check; do
      echo 'PostgreSQL no disponible aun, reintentando en 5s...'; sleep 5;
      done &&
      echo 'PostgreSQL listo. Ejecutando migraciones...' &&
      airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --role Admin --email ${AIRFLOW_ADMIN_EMAIL}"
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      rabbitmq:
        condition: service_healthy

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    depends_on:
      rabbitmq:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 120s

  flower:
    <<: *airflow-common
    command: celery flower
    depends_on:
      rabbitmq:
        condition: service_healthy
      airflow-scheduler:
        condition: service_started
    ports:
      - "127.0.0.1:5555:5555"
    environment:
      <<: *airflow-common-env
      FLOWER_BASIC_AUTH: ${FLOWER_USER}:${FLOWER_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  rabbitmq_data:
    driver: local

networks:
  airflow_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
